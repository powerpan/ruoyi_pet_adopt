name: ruoyi_pet_adopt

services:
  mysql:
    image: mysql:8.0
    container_name: ruoyi-pet-adopt-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ruoyi_pet_adopt_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ruoyi_pet_adopt}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql/ruoyi_pet_adopt.sql:/docker-entrypoint-initdb.d/01_ruoyi_pet_adopt.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ruoyi-pet-adopt-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ];
      then redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else redis-server --appendonly yes;
      fi'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    container_name: ruoyi-pet-adopt-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      RUOYI_PET_ADOPT_DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ruoyi_pet_adopt}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      RUOYI_PET_ADOPT_DB_USER: root
      RUOYI_PET_ADOPT_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ruoyi_pet_adopt_root}
      RUOYI_PET_ADOPT_REDIS_HOST: redis
      RUOYI_PET_ADOPT_REDIS_PORT: 6379
      RUOYI_PET_ADOPT_REDIS_DATABASE: ${REDIS_DATABASE:-0}
      RUOYI_PET_ADOPT_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RUOYI_PET_ADOPT_UPLOAD_PATH: /app/uploadPath
      RUOYI_PET_ADOPT_BOOTSTRAP_ADMIN_PASSWORD: ${RUOYI_PET_ADOPT_BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      RUOYI_PET_ADOPT_TOKEN_SECRET: ${RUOYI_PET_ADOPT_TOKEN_SECRET:-ruoyi-pet-adopt-docker-local-token-secret}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - upload-data:/app/uploadPath

  admin-web:
    build:
      context: ..
      dockerfile: deploy/admin-web/Dockerfile
    container_name: ruoyi-pet-adopt-admin-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${ADMIN_PORT:-8081}:80"

  pet-web:
    build:
      context: ..
      dockerfile: deploy/pet-web/Dockerfile
    container_name: ruoyi-pet-adopt-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PET_APP_PORT:-8088}:80"

volumes:
  mysql-data:
  redis-data:
  upload-data:
